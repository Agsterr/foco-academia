services:
  postgres:
    image: postgres:17-alpine
    container_name: foco-academia-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-academia}
      POSTGRES_USER: ${POSTGRES_USER:-academia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-academia}
    volumes:
      - academia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-academia}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: foco-academia-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-academia}
      DATABASE_USER: ${POSTGRES_USER:-academia}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-academia}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-at-least-32-chars!!}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
      UPLOAD_DIR: /app/uploads
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_INSTRUTOR_PASSWORD: ${SEED_INSTRUTOR_PASSWORD:-}
      SEED_ALUNO_PASSWORD: ${SEED_ALUNO_PASSWORD:-}
      APP_RELEASES_PATH: /app/releases
      APP_RELEASES_MAX_COUNT: "2"
      APP_RELEASE_DEPLOY_TOKEN: ${APP_RELEASE_DEPLOY_TOKEN:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://academia.focodev.com.br}
    volumes:
      - academia_uploads:/app/uploads
      - apk_releases:/app/releases

  aluno:
    build:
      context: .
      dockerfile: docker/aluno.Dockerfile
    container_name: foco-academia-aluno
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-}

  instrutor:
    build:
      context: .
      dockerfile: docker/instrutor.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-}
    container_name: foco-academia-instrutor
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: /admin
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-}
    container_name: foco-academia-admin
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: foco-academia-nginx
    restart: unless-stopped
    depends_on:
      - api
      - aluno
      - instrutor
      - admin
    ports:
      - "${HTTP_PORT:-8088}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro

  cloudflared:
    image: cloudflare/cloudflared:2026.5.2
    container_name: foco-academia-cloudflared
    restart: unless-stopped
    network_mode: host
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN:-}
    profiles:
      - tunnel

volumes:
  academia_pgdata:
  academia_uploads:
  apk_releases:
