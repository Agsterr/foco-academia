spring.application.name=academia-api

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/academia}
spring.datasource.username=${DATABASE_USER:academia}
spring.datasource.password=${DATABASE_PASSWORD:academia}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.jwt.secret=${JWT_SECRET:change-me-in-production-use-at-least-32-chars!!}
app.jwt.expiration-hours=${JWT_EXPIRATION_HOURS:168}
app.upload.dir=${UPLOAD_DIR:uploads}
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3001,http://localhost:3002}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

server.port=${SERVER_PORT:8080}
