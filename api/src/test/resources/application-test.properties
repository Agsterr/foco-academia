spring.application.name=academia-api-test

spring.datasource.url=jdbc:h2:mem:academia-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

app.jwt.secret=test-secret-key-with-at-least-32-characters!!
app.jwt.expiration-hours=24
app.jwt.refresh-grace-days=30
app.upload.dir=target/test-uploads
app.cors.allowed-origins=http://localhost:3000:3000

app.releases.storage-path=${java.io.tmpdir}/foco-academia-test-releases
app.releases.max-retained=2
app.releases.deploy-token=test-deploy-token-secret
app.releases.public-base-url=http://localhost

server.port=0:3000

server.port=0
