events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:8080;
    }
    upstream aluno {
        server aluno:3000;
    }
    upstream instrutor {
        server instrutor:3000;
    }
    upstream admin {
        server admin:3000;
    }

    server {
        listen 80;
        server_name instrutor-academia.focodev.com.br;

        client_max_body_size 150M;

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://instrutor;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80 default_server;
        server_name academia.focodev.com.br _;

        client_max_body_size 150M;

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /admin/ {
            return 301 /admin;
        }

        location /admin {
            proxy_pass http://admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /instrutor {
            return 301 https://instrutor-academia.focodev.com.br/;
        }

        location ~ ^/instrutor/(.*)$ {
            return 301 https://instrutor-academia.focodev.com.br/$1;
        }

        location / {
            proxy_pass http://aluno;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
